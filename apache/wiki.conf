# Alpine Apache vhost for fantasy-wiki
# Place in /etc/apache2/conf.d/wiki.conf
# Set WIKI_ROOT to wherever you cloned the repo (e.g. /var/www/wiki)

<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot WIKI_ROOT/src/public

    <Directory WIKI_ROOT/src/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Uploads — allow larger files for map images
    <Directory WIKI_ROOT/src/public/uploads>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog /var/log/apache2/wiki-error.log
    CustomLog /var/log/apache2/wiki-access.log combined
</VirtualHost>
